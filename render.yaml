services:
  - type: web
    name: papertrail-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL_MODE
        value: "true"
      - key: DB_SSL_CA
        sync: false
      - key: STORAGE_BACKEND
        value: "s3"
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: "auto"
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://paper-trail-theta.vercel.app"
      - key: FRONTEND_BASE_URL
        value: "https://paper-trail-theta.vercel.app"
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: papertrail-redis
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "4"

  - type: keyvalue
    name: papertrail-redis
    plan: free
    ipAllowList: []
