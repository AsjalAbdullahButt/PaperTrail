# Local/prod-parity stack: MySQL + Redis + backend + frontend.
# Usage: docker compose up --build
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root-pw}
      MYSQL_DATABASE: papertrail
      MYSQL_USER: papertrail
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me-db-pw}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-change-me-db-pw}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: papertrail
      DB_PASSWORD: ${DB_PASSWORD:-change-me-db-pw}
      DB_NAME: papertrail
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-with-a-long-random-secret}
      WEB_CONCURRENCY: "4"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
